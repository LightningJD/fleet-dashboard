<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Lightning Fleet Dashboard</title>
<style>
:root {
  --bg-1: #0a0e1a;
  --bg-2: #0f1420;
  --glass: rgba(255,255,255,0.05);
  --glass-2: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.12);
  --text: #e8eef5;
  --text-dim: #8a96a8;
  --text-bright: #ffffff;
  --green: #00e676;
  --green-bg: rgba(0,230,118,0.1);
  --red: #ff5252;
  --red-bg: rgba(255,82,82,0.1);
  --amber: #ffb74d;
  --amber-bg: rgba(255,183,77,0.1);
  --blue: #448aff;
  --blue-bg: rgba(68,138,255,0.1);
  --purple: #b388ff;
  --purple-bg: rgba(179,136,255,0.1);
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-1);
  background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 100%; padding: 12px; }
@media(min-width:640px) { .container { max-width: 720px; margin: 0 auto; padding: 16px; } }
@media(min-width:1000px) { .container { max-width: 960px; } }

/* Header */
.header {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  text-align: center;
}
.header h1 { font-size: 1.45rem; font-weight: 700; color: var(--text-bright); letter-spacing: -0.5px; }
.header .subtitle { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }
.header .host-badge {
  display: inline-block; margin-top: 8px; padding: 3px 10px;
  background: var(--glass-2); border: 1px solid var(--glass-border);
  border-radius: 20px; font-size: 0.72rem; color: var(--text-dim);
}

/* Cards */
.card {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 0.82rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.grid-4 { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
@media(min-width:640px) { .grid-4 { grid-template-columns: repeat(4,1fr); } }

/* Stat cards */
.stat { text-align: center; }
.stat .label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
.stat .value { font-size: 1.3rem; font-weight: 700; color: var(--text-bright); margin-top: 2px; }
.stat .value.green { color: var(--green); }
.stat .value.red { color: var(--red); }
.stat .value.amber { color: var(--amber); }
.stat .sub { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }

/* Fleet status */
.fleet-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--glass-2); border-radius: 10px; padding: 12px;
}
.fleet-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink:0; }
.fleet-icon.active { background: var(--green-bg); }
.fleet-icon.inactive { background: var(--amber-bg); }
.fleet-info { flex: 1; min-width: 0; }
.fleet-info .name { font-size: 0.88rem; font-weight: 600; color: var(--text-bright); }
.fleet-info .detail { font-size: 0.74rem; color: var(--text-dim); }
.status-pill {
  font-size: 0.65rem; padding: 2px 8px; border-radius: 20px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;
}
.status-pill.active { background: var(--green-bg); color: var(--green); }
.status-pill.inactive { background: var(--amber-bg); color: var(--amber); }

/* Calendar */
.cal-scroll {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px;
  -webkit-overflow-scrolling: touch;
}
.cal-day {
  flex-shrink: 0; width: 58px; background: var(--glass-2); border-radius: 10px;
  padding: 8px 4px; text-align: center; border: 1px solid transparent;
}
.cal-day.weekend { border-color: rgba(255,183,77,0.3); background: var(--amber-bg); }
.cal-day .dow { font-size: 0.62rem; color: var(--text-dim); text-transform: uppercase; }
.cal-day .date { font-size: 0.72rem; color: var(--text); margin: 2px 0; }
.cal-day .price { font-size: 0.88rem; font-weight: 700; color: var(--text-bright); }
.cal-day.weekend .price { color: var(--amber); }

/* Performance bars */
.perf-row { margin-bottom: 10px; }
.perf-row:last-child { margin-bottom: 0; }
.perf-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.perf-header .name { font-size: 0.8rem; color: var(--text); }
.perf-header .val { font-size: 0.8rem; font-weight: 600; }
.perf-bar { height: 6px; background: var(--glass-2); border-radius: 3px; overflow: hidden; }
.perf-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

/* Profit Calculator */
.profit-line {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.85rem;
}
.profit-line:last-of-type { border-bottom: none; }
.profit-line .label { color: var(--text-dim); }
.profit-line .amount { font-weight: 600; }
.profit-line .amount.pos { color: var(--green); }
.profit-line .amount.neg { color: var(--red); }
.profit-total {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; padding: 14px; border-radius: 10px; text-align: center;
}
.profit-total.pos { background: var(--green-bg); border: 1px solid rgba(0,230,118,0.2); }
.profit-total.neg { background: var(--red-bg); border: 1px solid rgba(255,82,82,0.2); }
.profit-total .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing:0.5px; }
.profit-total .amount { font-size: 1.6rem; font-weight: 800; }
.profit-total.pos .amount { color: var(--green); }
.profit-total.neg .amount { color: var(--red); }

/* Per-trip economics */
.per-trip {
  margin-top: 12px; padding: 12px; border-radius: 10px;
  background: var(--glass-2); border: 1px solid var(--glass-border);
}
.per-trip .pt-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-dim); margin-bottom: 8px; }
.per-trip .pt-row { display: flex; justify-content: space-between; font-size: 0.78rem; padding: 3px 0; }
.per-trip .pt-row .lbl { color: var(--text-dim); }
.per-trip .pt-row .val { font-weight: 600; color: var(--text-bright); }

/* Utilization Ring */
.util-ring-wrap { display: flex; align-items: center; gap: 20px; }
.util-ring {
  width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: conic-gradient(var(--red) 0% 16%, var(--glass-2) 16% 100%);
}
.util-ring-inner {
  width: 78px; height: 78px; border-radius: 50%;
  background: var(--bg-1); display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.util-ring-inner .pct { font-size: 1.5rem; font-weight: 800; color: var(--red); }
.util-ring-inner .lbl { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; }
.util-info { flex: 1; }
.util-info .badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 600; background: var(--red-bg); color: var(--red);
  margin-bottom: 6px;
}
.util-info p { font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; }
.util-info .potential {
  margin-top: 8px; padding: 8px 10px; border-radius: 8px;
  background: var(--green-bg); border: 1px solid rgba(0,230,118,0.15);
  font-size: 0.78rem; color: var(--green); font-weight: 600;
}

/* Action Items */
.action-note {
  font-size: 0.68rem; color: var(--amber); margin-bottom: 10px;
  padding: 6px 10px; background: var(--amber-bg); border-radius: 8px;
  border: 1px solid rgba(255,183,77,0.15);
}
.action-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px; border-radius: 10px; background: var(--glass-2); margin-bottom: 6px;
}
.action-item:last-child { margin-bottom: 0; }
.action-item .badge {
  flex-shrink: 0; font-size: 0.6rem; padding: 3px 7px; border-radius: 20px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; min-width: 52px; text-align: center;
}
.badge.high { background: var(--red-bg); color: var(--red); }
.badge.medium { background: var(--amber-bg); color: var(--amber); }
.badge.low { background: var(--blue-bg); color: var(--blue); }
.action-item .text { flex: 1; font-size: 0.8rem; color: var(--text); line-height: 1.4; }
.action-item .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.status-dot.pending { background: var(--text-dim); }
.status-dot.in_progress { background: var(--blue); animation: pulse 1.8s infinite; }
@keyframes pulse { 0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(68,138,255,0.4); } 50% { opacity:0.6; box-shadow:0 0 0 4px rgba(68,138,255,0); } }

/* Market Data */
.market-header { font-size: 0.95rem; font-weight: 700; color: var(--text-bright); margin-bottom: 2px; }
.market-sub { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 12px; }
.market-summary { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-bottom: 12px; }
@media(min-width:560px) { .market-summary { grid-template-columns: repeat(4,1fr); } }
.market-stat {
  background: var(--glass-2); border-radius: 8px; padding: 8px; text-align: center;
}
.market-stat .lbl { font-size: 0.62rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
.market-stat .val { font-size: 1.05rem; font-weight: 700; color: var(--text-bright); margin-top: 2px; }

/* Competitor table */
.comp-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; }
.comp-table { width: 100%; border-collapse: collapse; font-size: 0.74rem; min-width: 500px; }
.comp-table th {
  text-align: left; padding: 7px 6px; color: var(--text-dim);
  font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.4px;
  border-bottom: 1px solid var(--glass-border); white-space: nowrap;
}
.comp-table td { padding: 7px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }
.comp-table tr.high-util { background: rgba(0,230,118,0.05); }
.comp-table tr.you-row { background: rgba(68,138,255,0.08); border-left: 3px solid var(--blue); }
.all-star { display: inline-block; font-size: 0.58rem; padding: 1px 5px; border-radius: 10px; background: var(--purple-bg); color: var(--purple); font-weight: 600; margin-left: 3px; }
.util-tag { font-size: 0.6rem; padding: 1px 5px; border-radius: 8px; font-weight: 600; position: relative; cursor: help; }
.util-tag.high { color: var(--green); }
.util-tag.medium { color: var(--amber); }
.util-tag.low { color: var(--text-dim); }
.util-tag:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.9);
  color: #fff;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 0.55rem;
  white-space: nowrap;
  margin-bottom: 4px;
  z-index: 100;
  pointer-events: none;
}

/* Price comparison callout */
.price-callout { display: flex; gap: 8px; margin-top: 12px; }
.price-comp-box {
  flex: 1; border-radius: 10px; padding: 10px; text-align: center;
}
.price-comp-box.at-market { background: var(--glass-2); border: 1px solid var(--glass-border); }
.price-comp-box.below { background: var(--red-bg); border: 1px solid rgba(255,82,82,0.15); }
.price-comp-box.above { background: var(--green-bg); border: 1px solid rgba(0,230,118,0.15); }
.price-comp-box .title { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
.price-comp-box .row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 4px; font-size: 0.76rem; }
.price-comp-box .row .you { color: var(--text-bright); font-weight: 600; }
.price-comp-box .row .area { color: var(--text-dim); }
.price-comp-box .gap { font-size: 0.68rem; margin-top: 4px; }
.price-comp-box.below .gap { color: var(--red); }
.price-comp-box.at-market .gap { color: var(--green); }
.price-comp-box.above .gap { color: var(--green); }

/* Santa Fe alert */
.santa-fe-alert {
  background: var(--green-bg); border: 1px solid rgba(0,230,118,0.2);
  border-radius: 10px; padding: 14px; text-align: center; margin-top: 12px;
}
.santa-fe-alert .big { font-size: 1rem; font-weight: 700; color: var(--green); }
.santa-fe-alert .sub { font-size: 0.78rem; color: var(--text); margin-top: 4px; }
.santa-fe-info {
  background: var(--glass-2); border: 1px solid var(--glass-border);
  border-radius: 10px; padding: 14px; text-align: center; margin-top: 12px;
}
.santa-fe-info .big { font-size: 0.92rem; font-weight: 700; color: var(--text-bright); }
.santa-fe-info .sub { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }

/* History */
.history-note { font-size: 0.8rem; color: var(--text-dim); text-align: center; padding: 16px 0; }
.history-chart { display: none; }

/* Footer */
.footer { text-align: center; padding: 16px; }
.footer .ins { font-size: 0.76rem; color: var(--text); font-weight: 600; }
.footer .ins-detail { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }
.footer .updated { font-size: 0.65rem; color: var(--text-dim); margin-top: 10px; }

/* Loading */
.loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 80vh; font-size: 1.1rem; color: var(--text-dim);
}
</style>
</head>
<body>
<div id="app" class="loading">Loading dashboard…</div>

<script>
(async () => {
  try {
    const res = await fetch('data.json');
    const D = await res.json();
    const $ = id => document.getElementById(id);
    const fmt = n => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmt0 = n => '$' + Math.round(n).toLocaleString('en-US');

    const updated = new Date(D.lastUpdated);
    const updatedStr = updated.toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });

    // ========== FIX 1: Profit Calculator (from costs object) ==========
    // Months since policy start (not calendar month)
    const policyStart = new Date(costs.policyStart);
    const monthOfYear = Math.max(1, Math.round((updated - policyStart) / (1000 * 60 * 60 * 24 * 30)));
    const gross = D.earnings.totalEarned;
    const trips = D.performance.completedTrips.value;
    const costs = D.costs;

    const turoFees = gross * (costs.turoFeePercent / 100);
    const insuranceYTD = costs.insuranceMonthly * monthOfYear;
    const cleaningYTD = costs.cleaningMonthlyPerCar * costs.vehiclesCovered * monthOfYear;
    const totalCosts = turoFees + insuranceYTD + cleaningYTD;
    const netProfit = gross - totalCosts;

    // Per-trip economics (REAL net including all costs)
    const revenuePerTrip = trips > 0 ? gross / trips : 0;
    const turoFeePerTrip = revenuePerTrip * (costs.turoFeePercent / 100);
    const overheadPerTrip = trips > 0 ? (insuranceYTD + cleaningYTD) / trips : 0;
    const realNetPerTrip = revenuePerTrip - turoFeePerTrip - overheadPerTrip;

    // ---- Competitor rows ----
    const compRows = (D.marketData.competitors || []).map(c => ({ ...c }));
    compRows.sort((a, b) => {
      const ord = { High: 0, Medium: 1, Low: 2 };
      return (ord[a.utilization] ?? 3) - (ord[b.utilization] ?? 3);
    });

    const compCounts = compRows.reduce((acc, c) => {
      const u = (c.utilization || '').toLowerCase();
      acc[u] = (acc[u] || 0) + 1;
      return acc;
    }, { high: 0, medium: 0, low: 0 });

    // ---- Action items sort ----
    const priorityOrder = { high: 0, medium: 1, low: 2 };
    const actions = [...(D.actionItems || [])].sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

    // ========== FIX 4: Santa Fe alert (data-driven) ==========
    const santaFe = D.fleet.find(v => v.id === 'santa-fe') || D.fleet[1];
    const showSantaFeAlert = santaFe && !santaFe.listingComplete;
    const santaFeCompCount = D.santaFeMarket ? D.santaFeMarket.competitorCount : 0;

    // ========== FIX 2: Price comparison (from marketData) ==========
    const md = D.marketData;
    const weekdayGap = Math.round((1 - md.yourCalendarWeekdayAvg / md.areaWeekdayMedian) * 100);
    const weekendGap = Math.round((1 - md.yourCalendarWeekendAvg / md.areaWeekendMedian) * 100);

    function gapLabel(gap) {
      if (gap <= 5 && gap >= -5) return { text: '✅ At market', cls: 'at-market' };
      if (gap > 5) return { text: '🔻 ' + gap + '% below market', cls: 'below' };
      return { text: '🔺 ' + Math.abs(gap) + '% above market', cls: 'above' };
    }
    const weekdayInfo = gapLabel(weekdayGap);
    const weekendInfo = gapLabel(weekendGap);

    // ---- Build HTML ----
    let h = '<div class="container">';

    // Header
    h += `
      <div class="header">
        <h1>⚡ Lightning Fleet Dashboard</h1>
        <div class="subtitle">Updated ${updatedStr}</div>
        <div class="host-badge">${D.host.name} · ${D.host.tier}</div>
      </div>`;

    // Earnings Overview
    h += `
      <div class="card">
        <div class="card-title">💰 Earnings Overview</div>
        <div class="grid-4">
          <div class="stat"><div class="label">Total Earned</div><div class="value green">${fmt(D.earnings.totalEarned)}</div></div>
          <div class="stat"><div class="label">Upcoming</div><div class="value">${fmt(D.earnings.upcoming)}</div></div>
          <div class="stat"><div class="label">Reimbursements</div><div class="value">${fmt(D.earnings.reimbursements)}</div></div>
          <div class="stat"><div class="label">Incentives</div><div class="value">${fmt(D.earnings.incentives)}</div></div>
        </div>
      </div>`;

    // Fleet Status
    h += `<div class="card"><div class="card-title">🚗 Fleet Status</div>`;
    (D.fleet || []).forEach(v => {
      const active = v.status === 'Active';
      h += `
        <div class="fleet-card" style="margin-bottom:8px;">
          <div class="fleet-icon ${active ? 'active' : 'inactive'}">${active ? '🟢' : '🟡'}</div>
          <div class="fleet-info">
            <div class="name">${v.year} ${v.make} ${v.model}</div>
            <div class="detail">${v.details}${v.licensePlate ? ' · ' + v.licensePlate : ''}</div>
          </div>
          <div class="status-pill ${active ? 'active' : 'inactive'}">${v.status}</div>
        </div>`;
    });
    h += `</div>`;

    // ========== FIX 1: Profit Calculator ==========
    const netClass = netProfit >= 0 ? 'pos' : 'neg';
    h += `
      <div class="card">
        <div class="card-title">🧮 Profit Calculator — YTD ${updated.getFullYear()}</div>
        <div class="profit-line"><span class="label">Gross Earnings</span><span class="amount pos">+ ${fmt(gross)}</span></div>
        <div class="profit-line"><span class="label">Turo Fees (${costs.turoFeePercent}%)</span><span class="amount neg">− ${fmt(turoFees)}</span></div>
        <div class="profit-line"><span class="label">Insurance (${fmt0(costs.insuranceMonthly)}/mo × ${monthOfYear} months)</span><span class="amount neg">− ${fmt(insuranceYTD)}</span></div>
        <div class="profit-line"><span class="label">Cleaning (${fmt0(costs.cleaningMonthlyPerCar)}/mo × ${costs.vehiclesCovered} cars × ${monthOfYear} months)</span><span class="amount neg">− ${fmt(cleaningYTD)}</span></div>
        <div class="profit-total ${netClass}">
          <span class="label">Net Profit (YTD)</span>
          <span class="amount">${netProfit >= 0 ? '+' : ''}${fmt(netProfit)}</span>
        </div>
        <div class="per-trip">
          <div class="pt-title">Per-Trip Economics (${trips} trips)</div>
          <div class="pt-row"><span class="lbl">Revenue per trip</span><span class="val">${fmt(revenuePerTrip)}</span></div>
          <div class="pt-row"><span class="lbl">Turo fee per trip (${costs.turoFeePercent}%)</span><span class="val" style="color:var(--red)">− ${fmt(turoFeePerTrip)}</span></div>
          <div class="pt-row"><span class="lbl">Overhead per trip (insurance + cleaning)</span><span class="val" style="color:var(--red)">− ${fmt(overheadPerTrip)}</span></div>
          <div class="pt-row"><span class="lbl">REAL net per trip (all costs)</span><span class="val" style="color:${realNetPerTrip >= 0 ? 'var(--green)' : 'var(--red)'}">${realNetPerTrip >= 0 ? '+' : ''}${fmt(realNetPerTrip)}</span></div>
        </div>
      </div>`;

    // Utilization
    h += `
      <div class="card">
        <div class="card-title">📊 Utilization Analysis</div>
        <div class="util-ring-wrap">
          <div class="util-ring">
            <div class="util-ring-inner">
              <div class="pct">${D.fleet[0].utilization}%</div>
              <div class="lbl">Utilization</div>
            </div>
          </div>
          <div class="util-info">
            <span class="badge">⚠️ Low Utilization</span>
            <p>${D.fleet[0].utilization}% means roughly <strong>${Math.round(D.fleet[0].utilization / 100 * 30)} booked days</strong> out of 30.</p>
            <p style="margin-top:6px;font-size:0.72rem;color:var(--text-dim)">Same-model competitors: <strong style="color:var(--green)">${compCounts.high} High</strong> · <strong style="color:var(--amber)">${compCounts.medium} Medium</strong> · <strong style="color:var(--text-dim)">${compCounts.low} Low</strong> utilization</p>
            <div class="potential">📈 At 50% utilization with current pricing, you'd earn ~${fmt0(D.fleet[0].yourMedianPrice * 15)}/mo</div>
          </div>
        </div>
      </div>`;

    // ========== FIX 3: Action Items with manual note ==========
    h += `<div class="card"><div class="card-title">🎯 Action Items</div>`;
    h += `<div class="action-note">⚠️ Manually maintained — updates when you tell Jarvis</div>`;
    actions.forEach(a => {
      h += `
        <div class="action-item">
          <span class="badge ${a.priority}">${a.priority}</span>
          <span class="text">${a.item}</span>
          <span class="status-dot ${a.status}" title="${a.status}"></span>
        </div>`;
    });
    h += `</div>`;

    // Market Data — Competitor Section
    h += `
      <div class="card">
        <div class="card-title">🏪 Market Data</div>
        <div class="market-header">Tesla Model 3 in Las Vegas (10mi radius)</div>
        <div class="market-sub">Source: Turo Insights — ${md.sampleSize} cars, ${md.sampleMonth}</div>
        <div class="market-sub" style="font-size:0.58rem;color:var(--text-mute);margin-top:2px">Utilization ranges (estimated): Low &lt;30% · Medium 30-50% · High 50%+. Turo does not publish exact thresholds.</div>
        <div class="market-summary">
          <div class="market-stat"><div class="lbl">Weekend Median</div><div class="val">${fmt0(md.areaWeekendMedian)}</div></div>
          <div class="market-stat"><div class="lbl">Weekday Median</div><div class="val">${fmt0(md.areaWeekdayMedian)}</div></div>
          <div class="market-stat"><div class="lbl">Your Median</div><div class="val">${fmt0(md.yourMedianPrice)}</div></div>
          <div class="market-stat"><div class="lbl">Util Range</div><div class="val" style="font-size:0.82rem;">Low ↔ High</div></div>
        </div>
        <div class="comp-table-wrap">
          <table class="comp-table">
            <thead>
              <tr>
                <th>Year</th><th>Trim</th><th>★</th><th>Trips</th><th>Dist</th><th>Util</th><th>Wknd</th><th>Wkdy</th>
              </tr>
            </thead>
            <tbody>`;
    compRows.forEach(c => {
      const cls = c.isYou ? 'you-row' : (c.utilization === 'High' ? 'high-util' : '');
      const uCls = c.utilization.toLowerCase();
      h += `
        <tr class="${cls}">
          <td>${c.year}</td>
          <td>${c.trim}${c.allStar ? '<span class="all-star">★ All-Star</span>' : ''}</td>
          <td>${c.rating.toFixed(2)}</td>
          <td>${c.trips}</td>
          <td>${c.distance}</td>
          <td><span class="util-tag ${uCls}" data-tooltip="${c.utilization === 'High' ? 'Est. 50%+ (~15+ days/mo)' : c.utilization === 'Medium' ? 'Est. 30-50% (~9-15 days/mo)' : 'Est. <30% (~<9 days/mo)'} • Estimated range">${c.utilization}</span></td>
          <td>${fmt0(c.weekendPrice)}</td>
          <td>${fmt0(c.weekdayPrice)}</td>
        </tr>`;
    });
    h += `</tbody></table></div>`;

    // ========== FIX 2: Price comparison callout (dynamic) ==========
    h += `
      <div class="price-callout">
        <div class="price-comp-box ${weekdayInfo.cls}">
          <div class="title">Weekday</div>
          <div class="row"><span class="you">You: ${fmt0(md.yourCalendarWeekdayAvg)}</span><span class="area">Area: ${fmt0(md.areaWeekdayMedian)}</span></div>
          <div class="gap">${weekdayInfo.text}</div>
        </div>
        <div class="price-comp-box ${weekendInfo.cls}">
          <div class="title">Weekend</div>
          <div class="row"><span class="you">You: ${fmt0(md.yourCalendarWeekendAvg)}</span><span class="area">Area: ${fmt0(md.areaWeekendMedian)}</span></div>
          <div class="gap">${weekendInfo.text}</div>
        </div>
      </div>`;

    // ========== FIX 4: Santa Fe alert (data-driven) ==========
    if (showSantaFeAlert) {
      if (santaFeCompCount === 0) {
        h += `
          <div class="santa-fe-alert">
            <div class="big">🚀 ZERO competitors for Hyundai Santa Fe in Las Vegas</div>
            <div class="sub">First-mover advantage — est. <strong>$300-500/mo</strong> in early months (realistic for new listing at 15-25% utilization)</div>
          </div>`;
      } else {
        h += `
          <div class="santa-fe-info">
            <div class="big">📊 ${santaFeCompCount} competitor${santaFeCompCount !== 1 ? 's' : ''} for Santa Fe in Las Vegas</div>
            <div class="sub">Finish listing to capture market share</div>
          </div>`;
      }
    }

    h += `</div>`;

    // Calendar
    h += `
      <div class="card">
        <div class="card-title">📅 Calendar Pricing (avg ${fmt0(D.calendar.averagePrice)}/day)</div>
        <div class="cal-scroll">`;
    D.calendar.days.forEach(d => {
      const dayNum = d.date.split('-')[2];
      h += `<div class="cal-day ${d.weekend ? 'weekend' : ''}">
        <div class="dow">${d.day}</div>
        <div class="date">${parseInt(dayNum)}</div>
        <div class="price">${fmt0(d.price)}</div>
      </div>`;
    });
    h += `</div></div>`;

    // Performance Metrics
    const perf = D.performance;
    const perfBars = [
      { key:'cancellationRate', label:'Cancellation Rate', color:'var(--green)', val: perf.cancellationRate.value, goal: perf.cancellationRate.goal, goalType:'max', unit: perf.cancellationRate.unit, max: 10 },
      { key:'fiveStarRate', label:'5-Star Rate', color:'var(--green)', val: perf.fiveStarRate.value, goal: perf.fiveStarRate.goal, goalType:'min', unit: perf.fiveStarRate.unit, max: 100 },
      { key:'maintenance', label:'Maintenance', color:'var(--green)', val: perf.maintenance.value, goal: perf.maintenance.goal, goalType:'min', unit: perf.maintenance.unit, max: 100 },
      { key:'cleanliness', label:'Cleanliness', color:'var(--green)', val: perf.cleanliness.value, goal: perf.cleanliness.goal, goalType:'min', unit: perf.cleanliness.unit, max: 100 },
      { key:'completedTrips', label:'Completed Trips', color:'var(--blue)', val: perf.completedTrips.value, goal: perf.completedTrips.goal, goalType:'min', unit: perf.completedTrips.unit, max: perf.completedTrips.goal },
    ];
    h += `<div class="card"><div class="card-title">📈 Performance Metrics</div>`;
    perfBars.forEach(p => {
      const pct = Math.min(100, (p.val / p.max) * 100);
      const goalMet = p.goalType === 'max' ? p.val <= p.goal : p.val >= p.goal;
      const valColor = goalMet ? 'var(--green)' : 'var(--amber)';
      h += `
        <div class="perf-row">
          <div class="perf-header">
            <span class="name">${p.label}</span>
            <span class="val" style="color:${valColor}">${p.val}${p.unit} <span style="color:var(--text-dim);font-weight:400;font-size:0.72rem;">/ goal ${p.goalType === 'max' ? '≤' : '≥'}${p.goal}${p.unit}</span></span>
          </div>
          <div class="perf-bar"><div class="perf-fill" style="width:${pct}%;background:${p.color};"></div></div>
        </div>`;
    });
    h += `</div>`;

    // Historical Tracking
    h += `
      <div class="card">
        <div class="card-title">📜 Historical Tracking</div>`;
    if ((D.history || []).length <= 1) {
      h += `<div class="history-note">📝 Started tracking <strong>June 16, 2026</strong><br>Earnings data will accumulate here as cron jobs add daily snapshots.</div>`;
    }
    h += `<div class="history-chart" id="historyChart"></div>`;
    if ((D.history || []).length > 1) {
      h += `<div id="chartContainer" style="margin-top:12px;">`;
      const maxEarn = Math.max(...D.history.map(p => p.totalEarned));
      h += `<div style="display:flex;align-items:flex-end;gap:4px;height:120px;">`;
      D.history.forEach(p => {
        const barH = (p.totalEarned / maxEarn) * 100;
        h += `<div style="flex:1;text-align:center;">
          <div style="height:${barH}%;background:linear-gradient(180deg,var(--green),rgba(0,230,118,0.2));border-radius:4px 4px 0 0;min-height:4px;"></div>
          <div style="font-size:0.55rem;color:var(--text-dim);margin-top:4px;">${p.date.slice(5)}</div>
        </div>`;
      });
      h += `</div></div>`;
    }
    h += `</div>`;

    // ========== FIX 5: Insurance footer (from costs object) ==========
    h += `
      <div class="footer">
        <div class="ins">🛡️ Insurance — ${fmt0(costs.insuranceMonthly)}/mo · ${costs.vehiclesCovered} vehicles covered</div>
        <div class="ins-detail">Policy: ${costs.policyStart} → ${costs.policyEnd}</div>
        <div class="updated">Next All-Star assessment: ${D.host.nextAssessment} · Lightning Fleet Dashboard v3</div>
      </div>`;

    h += '</div>'; // container
    document.getElementById('app').innerHTML = h;
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="container"><div class="card" style="text-align:center;padding:40px;"><h2>⚠️ Error</h2><p style="color:var(--text-dim);margin-top:8px;">${err.message}</p></div></div>`;
  }
})();
</script>
</body>
</html>
